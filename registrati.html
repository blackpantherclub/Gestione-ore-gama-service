<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/x-icon" href="img/favicon.ico"/>
  <link rel="icon" type="image/png" href="img/favicon.png"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Registrati – Gama Service</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="img/apple-touch-icon.png"/>
  <meta name="theme-color" content="#ff6a00"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Gama Service"/>
</head>
<body>
<div class="page-sm">

  <div class="auth-logo" style="text-align:center;">
    <img src="img/logo.png" alt="Gama Service" style="height:80px;width:auto;margin:0 auto 8px;display:block;"/>
    <p>Registrazione Tecnico</p>
  </div>

  <div class="card">
    <div class="card-title">— Crea il tuo account</div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
      <div class="form-group">
        <label>Nome</label>
        <input type="text" id="regNome" placeholder="Mario"/>
      </div>
      <div class="form-group">
        <label>Cognome</label>
        <input type="text" id="regCognome" placeholder="Rossi"/>
      </div>
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" id="regEmail" placeholder="mario.rossi@email.it"/>
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" id="regPass" placeholder="minimo 6 caratteri"/>
    </div>

    <div class="form-group">
      <label>Conferma Password</label>
      <input type="password" id="regPass2" placeholder="ripeti la password"/>
    </div>

    <div class="alert alert-error" id="regError"></div>
    <div class="alert alert-success" id="regSuccess"></div>

    <button class="btn btn-primary" id="btnReg" onclick="doRegistra()">
      Crea account
    </button>
  </div>

  <div class="auth-link">
    Hai già un account? <a href="index.html">Accedi</a>
  </div>

</div>

<script type="module">
  import { auth, db } from './js/firebase-config.js';
  import {
    createUserWithEmailAndPassword
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import {
    doc, setDoc, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  window.doRegistra = async function() {
    const nome    = document.getElementById('regNome').value.trim();
    const cognome = document.getElementById('regCognome').value.trim();
    const email   = document.getElementById('regEmail').value.trim();
    const pass    = document.getElementById('regPass').value;
    const pass2   = document.getElementById('regPass2').value;
    const errEl   = document.getElementById('regError');
    const okEl    = document.getElementById('regSuccess');
    const btn     = document.getElementById('btnReg');

    errEl.classList.remove('show');
    okEl.classList.remove('show');

    if (!nome || !cognome || !email || !pass || !pass2) {
      showErr('Compila tutti i campi'); return;
    }
    if (pass !== pass2) { showErr('Le password non coincidono'); return; }
    if (pass.length < 6) { showErr('Password troppo corta (minimo 6 caratteri)'); return; }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Registrazione...';

    try {
      const cred = await createUserWithEmailAndPassword(auth, email, pass);
      const uid  = cred.user.uid;

      // Salva profilo su Firestore
      await setDoc(doc(db, 'utenti', uid), {
        uid,
        nome,
        cognome,
        nomeCompleto: `${nome} ${cognome}`,
        email,
        ruolo: 'operaio',
        creato: serverTimestamp()
      });

      okEl.textContent = 'Account creato! Reindirizzamento...';
      okEl.classList.add('show');

      setTimeout(() => { window.location.href = 'operaio.html'; }, 1500);

    } catch(e) {
      let msg = 'Errore durante la registrazione';
      if (e.code === 'auth/email-already-in-use') msg = 'Email già registrata';
      if (e.code === 'auth/invalid-email') msg = 'Email non valida';
      showErr(msg);
      btn.disabled = false;
      btn.innerHTML = 'Crea account';
    }
  };

  function showErr(msg) {
    const el = document.getElementById('regError');
    el.textContent = msg;
    el.classList.add('show');
  }
</script>

<script src="js/pwa-install.js"></script>
</body>
</html>
