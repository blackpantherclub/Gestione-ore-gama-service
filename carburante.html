<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/x-icon" href="img/favicon.ico"/>
  <link rel="icon" type="image/png" href="img/favicon.png"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Carburante – Gama Service</title>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    /* ── STATS ROW ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 14px;
      margin-bottom: 24px;
    }
    .stat-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
    }
    .s-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
    .s-val { font-size: 26px; font-weight: 700; color: var(--orange); font-family: 'Bebas Neue', sans-serif; letter-spacing: 1px; }

    /* ── FILTRI ── */
    .filtri-bar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 20px;
      align-items: center;
    }
    .filtri-bar select,
    .filtri-bar input[type="month"] {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 12px;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      cursor: pointer;
    }
    .filtri-bar select:focus,
    .filtri-bar input[type="month"]:focus {
      outline: none;
      border-color: var(--orange);
    }

    /* ── TABELLA ── */
    .data-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .data-table th {
      text-align: left;
      padding: 10px 12px;
      font-size: 10px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    .data-table td {
      padding: 11px 12px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    .data-table tr:last-child td { border-bottom: none; }
    .data-table tr:hover td { background: var(--surface2); }

    .targa-badge {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 15px;
      letter-spacing: 2px;
      color: var(--orange);
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 3px 10px;
      border-radius: 6px;
      display: inline-block;
    }

    /* ── MODAL ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 300;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay.show { display: flex; }
    .modal-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      width: 100%;
      max-width: 480px;
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 22px;
    }
    .modal-header h3 { font-size: 16px; font-weight: 700; }
    .modal-close {
      background: none; border: none; color: var(--muted);
      font-size: 22px; cursor: pointer; line-height: 1; padding: 0;
    }

    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 12px; color: var(--muted2); margin-bottom: 6px; font-weight: 500; }
    .form-group input,
    .form-group select {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 12px;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
    }
    .form-group input:focus,
    .form-group select:focus {
      outline: none;
      border-color: var(--orange);
    }
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    /* ── TARGHE CHIPS ── */
    .targhe-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
    }
    .targa-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 12px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 16px;
      letter-spacing: 2px;
      color: var(--orange);
    }
    .targa-chip button {
      background: none; border: none; color: var(--muted);
      cursor: pointer; font-size: 14px; line-height: 1;
      padding: 0; transition: color 0.15s;
    }
    .targa-chip button:hover { color: var(--red); }

    .btn { padding: 10px 20px; border-radius: 8px; font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; border: none; transition: all 0.15s; }
    .btn-primary { background: var(--orange); color: #fff; }
    .btn-primary:hover { opacity: 0.9; }
    .btn-secondary { background: var(--surface2); border: 1px solid var(--border); color: var(--muted2); }
    .btn-secondary:hover { border-color: var(--orange); color: var(--orange); }
    .btn-sm { padding: 7px 14px; font-size: 12px; }

    .alert-error {
      background: #ff3d3d18;
      border: 1px solid #ff3d3d44;
      color: #ff3d3d;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      display: none;
      margin-bottom: 12px;
    }
    .alert-error.show { display: block; }

    .empty-row td {
      text-align: center;
      padding: 40px;
      color: var(--muted);
      font-size: 13px;
    }

    /* Sezione visibile solo admin */
    .admin-only { display: none; }

    /* Tab operaio/admin switch view */
    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .page-header h2 { font-size: 22px; font-weight: 700; }
    .page-header .sub { font-size: 13px; color: var(--muted); margin-top: 4px; }

    .delete-btn {
      background: none; border: none; color: var(--muted);
      cursor: pointer; font-size: 15px; padding: 4px 6px;
      border-radius: 6px; transition: all 0.15s; line-height: 1;
    }
    .delete-btn:hover { color: var(--red); background: #ff3d3d18; }

    .totale-row td {
      font-weight: 700;
      color: var(--orange);
      border-top: 2px solid var(--border);
      background: var(--surface2);
    }
  </style>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="apple-touch-icon.png"/>
  <meta name="theme-color" content="#ff6a00"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Gama Service"/>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-logo">
    <img src="img/logo.png" alt="Gama Service" style="height:38px;width:auto;display:block;"/>
  </div>
  <div class="topbar-right">
    <span style="color:var(--orange);font-size:12px;font-weight:600;" id="topRuolo">CARBURANTE</span>
    <a id="linkBack" href="operaio.html" style="background:var(--surface2);border:1px solid var(--border);color:var(--muted2);padding:6px 14px;border-radius:8px;font-size:12px;text-decoration:none;font-family:'Inter',sans-serif;">← Torna</a>
    <span id="topNome" style="font-size:13px;"></span>
    <button class="btn-logout" onclick="doLogout()">Esci</button>
  </div>
</div>

<div class="page">

  <!-- HEADER -->
  <div class="page-header">
    <div>
      <h2>⛽ Registro Carburante</h2>
      <div class="sub" id="pageSubtitle">I tuoi rifornimenti</div>
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;">
      <!-- Solo admin: gestione targhe -->
      <button class="btn btn-secondary btn-sm admin-only" id="btnGestisciTarghe" onclick="apriGestisciTarghe()">🚐 Gestisci targhe</button>
      <!-- Tutti: aggiungi rifornimento -->
      <button class="btn btn-primary btn-sm" onclick="apriNuovoRifornimento()">+ Rifornimento</button>
    </div>
  </div>

  <!-- STATS -->
  <div class="stats-row" id="statsRow">
    <div class="stat-box">
      <div class="s-label">Rifornimenti mese</div>
      <div class="s-val" id="statCount">0</div>
    </div>
    <div class="stat-box">
      <div class="s-label">Litri mese</div>
      <div class="s-val" id="statLitri">0 L</div>
    </div>
    <div class="stat-box">
      <div class="s-label">Spesa mese</div>
      <div class="s-val" id="statSpesa">€ 0</div>
    </div>
    <div class="stat-box admin-only">
      <div class="s-label">Mezzi riforniti</div>
      <div class="s-val" id="statMezzi">0</div>
    </div>
  </div>

  <!-- FILTRI -->
  <div class="filtri-bar">
    <input type="month" id="filtroMese" onchange="applicaFiltri()"/>
    <select id="filtroTarga" onchange="applicaFiltri()">
      <option value="">Tutte le targhe</option>
    </select>
    <!-- Solo admin: filtro per operaio -->
    <select id="filtroOperaio" class="admin-only" onchange="applicaFiltri()">
      <option value="">Tutti gli operai</option>
    </select>
  </div>

  <!-- TABELLA -->
  <div class="card" style="padding:0;overflow:hidden;">
    <div style="overflow-x:auto;">
      <table class="data-table">
        <thead id="tableHead"></thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<!-- ══════════════════════════════════════
     MODAL: NUOVO RIFORNIMENTO
══════════════════════════════════════ -->
<div class="modal-overlay" id="modalRifornimento">
  <div class="modal-box">
    <div class="modal-header">
      <h3>⛽ Nuovo rifornimento</h3>
      <button class="modal-close" onclick="chiudiModalRifornimento()">✕</button>
    </div>

    <div class="form-group">
      <label>Targa mezzo *</label>
      <select id="rTarga">
        <option value="">Seleziona targa...</option>
      </select>
    </div>

    <div class="form-grid">
      <div class="form-group">
        <label>Data *</label>
        <input type="date" id="rData"/>
      </div>
      <div class="form-group">
        <label>Km al pieno *</label>
        <input type="number" id="rKm" placeholder="es. 45230" min="0"/>
      </div>
      <div class="form-group">
        <label>Litri *</label>
        <input type="number" id="rLitri" placeholder="es. 50" min="0" step="0.01"/>
      </div>
      <div class="form-group">
        <label>Importo (€) *</label>
        <input type="number" id="rImporto" placeholder="es. 85.50" min="0" step="0.01"/>
      </div>
    </div>

    <div class="form-group">
      <label>Note (opzionale)</label>
      <input type="text" id="rNote" placeholder="es. Autostrada A1"/>
    </div>

    <div class="alert-error" id="rifError"></div>

    <div style="display:flex;gap:10px;margin-top:6px;">
      <button class="btn btn-primary" style="flex:1;" onclick="salvaRifornimento()">💾 Salva</button>
      <button class="btn btn-secondary" onclick="chiudiModalRifornimento()">Annulla</button>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════
     MODAL: GESTISCI TARGHE (solo admin)
══════════════════════════════════════ -->
<div class="modal-overlay" id="modalTarghe">
  <div class="modal-box">
    <div class="modal-header">
      <h3>🚐 Gestisci Targhe Mezzi</h3>
      <button class="modal-close" onclick="chiudiModalTarghe()">✕</button>
    </div>

    <div class="targhe-list" id="targheList">
      <div style="color:var(--muted);font-size:13px;">Nessuna targa aggiunta.</div>
    </div>

    <div style="display:flex;gap:10px;margin-top:4px;">
      <input type="text" id="nuovaTarga"
        placeholder="es. AB123CD"
        style="flex:1;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:10px 12px;border-radius:8px;font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;text-transform:uppercase;"
        onkeydown="if(event.key==='Enter') aggiungiTarga()"/>
      <button class="btn btn-primary" onclick="aggiungiTarga()">+ Aggiungi</button>
    </div>
    <div class="alert-error" id="targaError" style="margin-top:10px;"></div>

    <div style="margin-top:20px;font-size:12px;color:var(--muted);">
      Le targhe eliminate non cancellano i rifornimenti già registrati.
    </div>
  </div>
</div>

<script type="module">
import { auth, db } from './js/firebase-config.js';
import {
  onAuthStateChanged, signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import {
  collection, doc, getDoc, getDocs, addDoc, deleteDoc,
  setDoc, serverTimestamp, query, orderBy, where
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const MESI = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno',
              'Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];

let currentUser  = null;
let profilo      = null;
let isAdmin      = false;
let targhe       = [];       // array di stringhe
let rifornimenti = [];       // tutti i rifornimenti caricati
let operaiMap    = {};       // uid → nomeCompleto (solo admin)

// ── AUTH ──────────────────────────────────────────────
onAuthStateChanged(auth, async (user) => {
  if (!user) { window.location.href = 'index.html'; return; }
  currentUser = user;

  const snap = await getDoc(doc(db, 'utenti', user.uid));
  if (!snap.exists()) { window.location.href = 'index.html'; return; }
  profilo = snap.data();
  isAdmin = profilo.ruolo === 'admin';

  // UI adatta al ruolo
  if (isAdmin) {
    document.querySelectorAll('.admin-only').forEach(el => el.style.display = '');
    document.getElementById('topRuolo').textContent    = 'AMMINISTRATORE';
    document.getElementById('linkBack').href           = 'admin.html';
    document.getElementById('pageSubtitle').textContent = 'Tutti i rifornimenti';
    // Carica mappa operai
    const opSnap = await getDocs(collection(db, 'utenti'));
    opSnap.forEach(d => {
      const u = d.data();
      if (u.ruolo !== 'admin') operaiMap[u.uid] = u.nomeCompleto || `${u.nome} ${u.cognome}`;
    });
    // Popola filtro operai
    const selOp = document.getElementById('filtroOperaio');
    Object.entries(operaiMap).forEach(([uid, nome]) => {
      const opt = document.createElement('option');
      opt.value = uid; opt.textContent = nome;
      selOp.appendChild(opt);
    });
  } else {
    document.getElementById('topNome').textContent = `${profilo.nome} ${profilo.cognome}`;
  }

  // Imposta mese corrente nel filtro
  const oggi = new Date();
  document.getElementById('filtroMese').value =
    `${oggi.getFullYear()}-${String(oggi.getMonth()+1).padStart(2,'0')}`;

  // Intestazione tabella
  renderTableHead();

  await caricaTarghe();
  await caricaRifornimenti();
});

// ── TARGHE ────────────────────────────────────────────
async function caricaTarghe() {
  const snap = await getDoc(doc(db, 'config', 'targhe'));
  targhe = snap.exists() ? (snap.data().lista || []) : [];
  renderTargheModal();
  popolaSelectTarghe();
}

function renderTargheModal() {
  const el = document.getElementById('targheList');
  if (targhe.length === 0) {
    el.innerHTML = '<div style="color:var(--muted);font-size:13px;">Nessuna targa aggiunta.</div>';
    return;
  }
  el.innerHTML = targhe.map(t => `
    <div class="targa-chip">
      ${t}
      ${isAdmin ? `<button onclick="rimuoviTarga('${t}')" title="Rimuovi">✕</button>` : ''}
    </div>
  `).join('');
}

function popolaSelectTarghe() {
  // Select nel modal rifornimento
  const sel = document.getElementById('rTarga');
  sel.innerHTML = '<option value="">Seleziona targa...</option>';
  targhe.forEach(t => {
    const opt = document.createElement('option');
    opt.value = t; opt.textContent = t;
    sel.appendChild(opt);
  });

  // Select filtro
  const filtro = document.getElementById('filtroTarga');
  const valoreAttuale = filtro.value;
  filtro.innerHTML = '<option value="">Tutte le targhe</option>';
  targhe.forEach(t => {
    const opt = document.createElement('option');
    opt.value = t; opt.textContent = t;
    filtro.appendChild(opt);
  });
  filtro.value = valoreAttuale;
}

window.aggiungiTarga = async function() {
  const input = document.getElementById('nuovaTarga');
  const targa = input.value.trim().toUpperCase().replace(/\s/g,'');
  const errEl = document.getElementById('targaError');

  errEl.classList.remove('show');
  if (!targa) return;
  if (targhe.includes(targa)) {
    errEl.textContent = 'Targa già presente.';
    errEl.classList.add('show'); return;
  }

  targhe.push(targa);
  await setDoc(doc(db, 'config', 'targhe'), { lista: targhe });
  input.value = '';
  renderTargheModal();
  popolaSelectTarghe();
  showToast('✓ Targa aggiunta!');
};

window.rimuoviTarga = async function(targa) {
  if (!confirm(`Rimuovere la targa ${targa} dalla lista?`)) return;
  targhe = targhe.filter(t => t !== targa);
  await setDoc(doc(db, 'config', 'targhe'), { lista: targhe });
  renderTargheModal();
  popolaSelectTarghe();
  showToast('Targa rimossa.');
};

window.apriGestisciTarghe = () => document.getElementById('modalTarghe').classList.add('show');
window.chiudiModalTarghe  = () => document.getElementById('modalTarghe').classList.remove('show');

// ── RIFORNIMENTI ──────────────────────────────────────
async function caricaRifornimenti() {
  rifornimenti = [];

  if (isAdmin) {
    // Admin: carica tutti
    const snap = await getDocs(query(collection(db, 'rifornimenti'), orderBy('dataTs', 'desc')));
    snap.forEach(d => rifornimenti.push({ id: d.id, ...d.data() }));
  } else {
    // Operaio: solo i suoi
    const snap = await getDocs(query(
      collection(db, 'rifornimenti'),
      where('uid', '==', currentUser.uid),
      orderBy('dataTs', 'desc')
    ));
    snap.forEach(d => rifornimenti.push({ id: d.id, ...d.data() }));
  }

  applicaFiltri();
}

// ── FILTRI E RENDER ───────────────────────────────────
window.applicaFiltri = function() {
  const mese    = document.getElementById('filtroMese').value;      // "2026-05"
  const targa   = document.getElementById('filtroTarga').value;
  const operaio = isAdmin ? document.getElementById('filtroOperaio').value : currentUser.uid;

  let filtrati = rifornimenti;

  if (mese) {
    filtrati = filtrati.filter(r => r.data && r.data.startsWith(mese));
  }
  if (targa) {
    filtrati = filtrati.filter(r => r.targa === targa);
  }
  if (isAdmin && operaio) {
    filtrati = filtrati.filter(r => r.uid === operaio);
  }

  renderTabella(filtrati);
  renderStats(filtrati);
};

function renderTableHead() {
  const head = document.getElementById('tableHead');
  if (isAdmin) {
    head.innerHTML = `<tr>
      <th>Data</th>
      <th>Targa</th>
      <th>Operaio</th>
      <th>Km</th>
      <th>Litri</th>
      <th>Importo</th>
      <th>Note</th>
      <th></th>
    </tr>`;
  } else {
    head.innerHTML = `<tr>
      <th>Data</th>
      <th>Targa</th>
      <th>Km</th>
      <th>Litri</th>
      <th>Importo</th>
      <th>Note</th>
      <th></th>
    </tr>`;
  }
}

function renderTabella(lista) {
  const tbody = document.getElementById('tableBody');

  if (lista.length === 0) {
    const cols = isAdmin ? 8 : 7;
    tbody.innerHTML = `<tr class="empty-row"><td colspan="${cols}">Nessun rifornimento trovato per il periodo selezionato.</td></tr>`;
    return;
  }

  // Ordina per data decrescente
  const ordinati = [...lista].sort((a,b) => b.data.localeCompare(a.data));

  let totLitri = 0, totImporto = 0;

  const righe = ordinati.map(r => {
    totLitri   += parseFloat(r.litri)   || 0;
    totImporto += parseFloat(r.importo) || 0;

    const dataFmt = r.data ? new Date(r.data + 'T00:00:00').toLocaleDateString('it-IT', {day:'2-digit',month:'2-digit',year:'numeric'}) : '—';
    const nomeOp  = isAdmin ? (operaiMap[r.uid] || r.uid) : '';
    const kmFmt   = r.km ? parseInt(r.km).toLocaleString('it-IT') + ' km' : '—';
    const litriFmt   = r.litri   ? parseFloat(r.litri).toFixed(1)   + ' L'  : '—';
    const importoFmt = r.importo ? '€ ' + parseFloat(r.importo).toFixed(2) : '—';

    const adminExtra = isAdmin ? `<td style="font-size:12px;color:var(--muted2);">${nomeOp}</td>` : '';

    return `<tr>
      <td style="white-space:nowrap;">${dataFmt}</td>
      <td><span class="targa-badge">${r.targa || '—'}</span></td>
      ${adminExtra}
      <td style="font-size:13px;">${kmFmt}</td>
      <td style="color:var(--orange);font-weight:600;">${litriFmt}</td>
      <td style="font-weight:600;">${importoFmt}</td>
      <td style="font-size:12px;color:var(--muted);">${r.note || ''}</td>
      <td>
        ${(isAdmin || r.uid === currentUser.uid) ? `<button class="delete-btn" onclick="eliminaRifornimento('${r.id}')" title="Elimina">🗑</button>` : ''}
      </td>
    </tr>`;
  }).join('');

  // Riga totali
  const adminExtra = isAdmin ? '<td></td>' : '';
  const rigaTotale = `<tr class="totale-row">
    <td colspan="2" style="font-size:12px;letter-spacing:1px;">TOTALE PERIODO</td>
    ${adminExtra}
    <td>—</td>
    <td>${totLitri.toFixed(1)} L</td>
    <td>€ ${totImporto.toFixed(2)}</td>
    <td colspan="2"></td>
  </tr>`;

  tbody.innerHTML = righe + rigaTotale;
}

function renderStats(lista) {
  const totLitri   = lista.reduce((s,r) => s + (parseFloat(r.litri)   || 0), 0);
  const totImporto = lista.reduce((s,r) => s + (parseFloat(r.importo) || 0), 0);
  const mezziSet   = new Set(lista.map(r => r.targa));

  document.getElementById('statCount').textContent  = lista.length;
  document.getElementById('statLitri').textContent  = totLitri.toFixed(1) + ' L';
  document.getElementById('statSpesa').textContent  = '€ ' + totImporto.toFixed(2);
  if (isAdmin) document.getElementById('statMezzi').textContent = mezziSet.size;
}

// ── NUOVO RIFORNIMENTO ────────────────────────────────
window.apriNuovoRifornimento = function() {
  document.getElementById('rTarga').value  = '';
  document.getElementById('rData').value   = new Date().toISOString().split('T')[0];
  document.getElementById('rKm').value     = '';
  document.getElementById('rLitri').value  = '';
  document.getElementById('rImporto').value= '';
  document.getElementById('rNote').value   = '';
  document.getElementById('rifError').classList.remove('show');
  document.getElementById('modalRifornimento').classList.add('show');
};

window.chiudiModalRifornimento = function() {
  document.getElementById('modalRifornimento').classList.remove('show');
};

window.salvaRifornimento = async function() {
  const targa   = document.getElementById('rTarga').value;
  const data    = document.getElementById('rData').value;
  const km      = document.getElementById('rKm').value;
  const litri   = document.getElementById('rLitri').value;
  const importo = document.getElementById('rImporto').value;
  const note    = document.getElementById('rNote').value.trim();
  const errEl   = document.getElementById('rifError');

  errEl.classList.remove('show');
  if (!targa || !data || !km || !litri || !importo) {
    errEl.textContent = 'Compila tutti i campi obbligatori.';
    errEl.classList.add('show'); return;
  }

  const nomeOp = profilo.nomeCompleto || `${profilo.nome} ${profilo.cognome}`;

  await addDoc(collection(db, 'rifornimenti'), {
    uid:        currentUser.uid,
    nomeOp,
    targa,
    data,
    dataTs:     new Date(data + 'T12:00:00'),
    km:         parseFloat(km),
    litri:      parseFloat(litri),
    importo:    parseFloat(importo),
    note,
    creato:     serverTimestamp()
  });

  showToast('✓ Rifornimento salvato!');
  chiudiModalRifornimento();
  await caricaRifornimenti();
};

// ── ELIMINA RIFORNIMENTO ──────────────────────────────
window.eliminaRifornimento = async function(id) {
  if (!confirm('Eliminare questo rifornimento?')) return;
  await deleteDoc(doc(db, 'rifornimenti', id));
  showToast('Rifornimento eliminato.');
  await caricaRifornimenti();
};

// ── LOGOUT ────────────────────────────────────────────
window.doLogout = async function() {
  await signOut(auth);
  window.location.href = 'index.html';
};

// ── TOAST ─────────────────────────────────────────────
function showToast(msg, err=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (err ? ' error' : '');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
