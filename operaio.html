<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/x-icon" href="img/favicon.ico"/>
  <link rel="icon" type="image/png" href="img/favicon.png"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Le mie ore – Gama Service</title>

  <link rel="stylesheet" href="css/style.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    /* ── BUSTE PAGA ── */
    .busta-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 8px;
      gap: 10px;
    }
    .busta-item:hover { border-color: var(--orange-border); }
    .busta-info { flex: 1; min-width: 0; }
    .busta-nome { font-size: 13px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .busta-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .btn-scarica-busta {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted2);
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      transition: all 0.15s;
      white-space: nowrap;
      flex-shrink: 0;
      text-decoration: none;
    }
    .btn-scarica-busta:hover { border-color: var(--orange); color: var(--orange); }
    .buste-empty {
      text-align: center;
      padding: 30px;
      color: var(--muted);
      font-size: 13px;
    }
  </style>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="apple-touch-icon.png"/>
  <meta name="theme-color" content="#ff6a00"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Gama Service"/>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-logo"><img src="img/logo.png" alt="Gama Service" style="height:38px;width:auto;display:block;"/></div>
  <div class="topbar-right">
    <span id="topNome"></span>
    <a href="carburante.html" style="background:var(--surface2);border:1px solid var(--border);color:var(--muted2);padding:6px 14px;border-radius:8px;font-size:12px;text-decoration:none;font-family:'Inter',sans-serif;">⛽ Carburante</a>
    <button class="btn-logout" onclick="doLogout()">Esci</button>
  </div>
</div>

<div class="page">

  <!-- HEADER -->
  <div class="operaio-header">
    <div>
      <h2 id="benvenuto">Caricamento...</h2>
      <div class="sub" id="subEmail"></div>
    </div>
    <div class="month-nav">
      <button onclick="cambioMese(-1)">‹</button>
      <div class="month-label" id="monthLabel"></div>
      <button onclick="cambioMese(+1)">›</button>
    </div>
  </div>

  <!-- STATS -->
  <div class="stats-row" id="statsRow">
    <div class="stat-box">
      <div class="s-label">Ore totali mese</div>
      <div class="s-val" id="statOreMese">0h</div>
    </div>
    <div class="stat-box">
      <div class="s-label">Giorni lavorati</div>
      <div class="s-val" id="statGiorni">0</div>
    </div>
    <div class="stat-box">
      <div class="s-label">Ore settimana</div>
      <div class="s-val" id="statSettimana">0h</div>
    </div>
    <div class="stat-box">
      <div class="s-label">Media giornaliera</div>
      <div class="s-val" id="statMedia">0h</div>
    </div>
  </div>

  <!-- AZIONI -->
  <div style="display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;">
    <button class="btn btn-secondary btn-sm" onclick="salvaTutto()">💾 Salva</button>
    <button class="btn btn-secondary btn-sm" onclick="scaricaPDF()">📄 Scarica PDF mese</button>
  </div>

  <!-- TABELLA ORE -->
  <div class="card" style="padding:0;overflow:hidden;">
    <div style="overflow-x:auto;">
      <table class="data-table" id="tabellaOre">
        <thead>
          <tr>
            <th>Giorno</th>
            <th>Inizio Lavoro</th>
            <th>Fine lavoro</th>
            <th>Pausa pranzo (min)</th>
            <th>Straordinario</th>
            <th>Ore totali</th>
            <th>Cantiere</th>
          </tr>
        </thead>
        <tbody id="tbodyOre"></tbody>
      </table>
    </div>
  </div>

  <!-- ══════════════════════════════════════
       ARCHIVIO BUSTE PAGA
  ══════════════════════════════════════ -->
  <div class="card" style="margin-top:20px;">
    <div class="card-title">— 📎 Archivio Buste Paga</div>
    <div id="archuvioBuste">
      <div class="buste-empty"><span class="spinner"></span></div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script type="module">
  import { auth, db } from './js/firebase-config.js';
  import {
    onAuthStateChanged, signOut
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import {
    doc, getDoc, setDoc, serverTimestamp, collection, getDocs, query, orderBy
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  let currentUser = null;
  let profilo     = null;
  let viewYear    = new Date().getFullYear();
  let viewMonth   = new Date().getMonth();
  let datiMese    = {};

  const MESI = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno',
                'Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];

  // ── AUTH CHECK ──
  onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.href = 'index.html'; return; }
    currentUser = user;

    const snap = await getDoc(doc(db, 'utenti', user.uid));
    if (!snap.exists()) { window.location.href = 'index.html'; return; }
    profilo = snap.data();
    if (profilo.ruolo === 'admin') { window.location.href = 'admin.html'; return; }

    document.getElementById('benvenuto').textContent = `Ciao, ${profilo.nome}!`;
    document.getElementById('subEmail').textContent  = profilo.email;
    document.getElementById('topNome').textContent   = `${profilo.nome} ${profilo.cognome}`;

    await caricaMese();
    await caricaBustePaga();
  });

  // ── MESE ──
  window.cambioMese = async function(dir) {
    await salvaSilenzioso();
    viewMonth += dir;
    if (viewMonth > 11) { viewMonth = 0; viewYear++; }
    if (viewMonth < 0)  { viewMonth = 11; viewYear--; }
    await caricaMese();
  };

  async function caricaMese() {
    const chiave = `${viewYear}_${String(viewMonth+1).padStart(2,'0')}`;
    document.getElementById('monthLabel').textContent = `${MESI[viewMonth]} ${viewYear}`;
    const ref  = doc(db, 'utenti', currentUser.uid, 'mesi', chiave);
    const snap = await getDoc(ref);
    datiMese = snap.exists() ? (snap.data().giorni || {}) : {};
    creaTabella();
    aggiornaStats();
  }

  // ── BUSTE PAGA ──
  async function caricaBustePaga() {
    const el = document.getElementById('archuvioBuste');
    try {
      const snap = await getDocs(
        query(collection(db, 'utenti', currentUser.uid, 'bustePaga'), orderBy('caricato', 'desc'))
      );

      if (snap.empty) {
        el.innerHTML = '<div class="buste-empty">Nessuna busta paga disponibile.<br><span style="font-size:11px;color:var(--muted);">Le buste vengono caricate dall\'amministratore.</span></div>';
        return;
      }

      el.innerHTML = '';
      snap.forEach(d => {
        const b = d.data();
        const data = b.caricato?.toDate ? b.caricato.toDate().toLocaleDateString('it-IT', {day:'2-digit',month:'2-digit',year:'numeric'}) : '—';
        const div = document.createElement('div');
        div.className = 'busta-item';
        div.innerHTML = `
          <div class="busta-info">
            <div class="busta-nome">📄 ${b.nome}</div>
            <div class="busta-meta">Caricata il ${data} · ${formatBytes(b.dimensione || 0)}</div>
          </div>
          <button class="btn-scarica-busta" onclick="visualizzaBusta('${b.url}', '${b.nome}')">👁 Visualizza</button>
        `;
        el.appendChild(div);
      });
    } catch(e) {
      el.innerHTML = `<div class="buste-empty" style="color:#ff3d3d;">Errore caricamento buste: ${e.message}</div>`;
    }
  }

  function formatBytes(bytes) {
    if (bytes === 0) return '0 B';
    const k = 1024, sizes = ['B','KB','MB'];
    const i = Math.floor(Math.log(bytes) / Math.log(k));
    return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
  }

  // ── GENERA OPZIONI ORA ──
  function opzioniOra(selezionato) {
    let html = '<option value="">--</option>';
    for (let h = 0; h < 24; h++) {
      for (let m of [0, 30]) {
        const val = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
        html += `<option value="${val}"${val===selezionato?' selected':''}>${val}</option>`;
      }
    }
    return html;
  }

  function opzioniPausa(selezionato) {
    let html = '<option value="">--</option>';
    for (let m = 10; m <= 60; m += 10) {
      const label = m < 60 ? `${m} min` : `1 ora`;
      const sel   = String(m) === String(selezionato) ? 'selected' : '';
      html += `<option value="${m}" ${sel}>${label}</option>`;
    }
    return html;
  }

  // ── TABELLA ──
  function creaTabella() {
    const tbody = document.getElementById('tbodyOre');
    tbody.innerHTML = '';
    const giorniNelMese = new Date(viewYear, viewMonth+1, 0).getDate();
    const oggi = new Date();

    for (let g = 1; g <= giorniNelMese; g++) {
      const data    = new Date(viewYear, viewMonth, g);
      const dow     = data.getDay();
      const weekend = dow === 0 || dow === 6;
      const isOggi  = oggi.getFullYear()===viewYear && oggi.getMonth()===viewMonth && oggi.getDate()===g;
      const nomeG   = data.toLocaleDateString('it-IT', { weekday:'short', day:'2-digit', month:'2-digit' });

      if (!datiMese[g]) datiMese[g] = { partenza:'', fine:'', pausa:'', straordinario:'', note:'', totale:'' };
      const r = datiMese[g];

      const tr = document.createElement('tr');
      if (isOggi) tr.style.outline = '2px solid var(--orange)';

      tr.innerHTML = `
        <td class="${weekend?'weekend':''}" style="${isOggi?'font-weight:700;':''}">${nomeG}</td>
        <td><select onchange="aggiornaRiga(${g},'partenza',this.value)">${opzioniOra(r.partenza)}</select></td>
        <td><select onchange="aggiornaRiga(${g},'fine',this.value)">${opzioniOra(r.fine)}</select></td>
        <td><select onchange="aggiornaRiga(${g},'pausa',this.value)">${opzioniPausa(r.pausa)}</select></td>
        <td>
          ${(()=>{
            const now = new Date();
            const isOggiStrao = oggi.getFullYear()===viewYear && oggi.getMonth()===viewMonth && oggi.getDate()===g;
            const dataGiorno = new Date(viewYear, viewMonth, g);
            const passato = dataGiorno < new Date(oggi.getFullYear(), oggi.getMonth(), oggi.getDate());
            const oraSblocco = now.getHours() > 17 || (now.getHours() === 17 && now.getMinutes() >= 30);
            // Bloccato se: giorno passato (qualunque sia il valore) OPPURE oggi prima delle 17:30
            const bloccato = passato || (isOggiStrao && !oraSblocco);
            const valoreEsistente = r.straordinario || '';
            const placeholder = bloccato ? (isOggiStrao ? '🔒 dopo 17:30' : '🔒') : 'es. 1h';
            return `<input type="text" value="${valoreEsistente}" placeholder="${placeholder}"
              style="width:80px;${bloccato ? 'opacity:0.45;cursor:not-allowed;' : ''}"
              ${bloccato ? 'disabled' : ''}
              oninput="aggiornaRiga(${g},'straordinario',this.value)"
              onchange="aggiornaRiga(${g},'straordinario',this.value)"
              title="${bloccato ? (isOggiStrao ? 'Disponibile dopo le 17:30' : 'Non modificabile: giorno passato') : 'Ore straordinario'}"/>`;
          })()}
        </td>
        <td class="totale" id="tot-${g}">${r.totale}</td>
        <td>
          <input type="text" value="${r.note||''}" placeholder="cantiere..."
            style="width:130px;${(r.partenza && r.fine && !r.note) ? 'border-color:var(--red);outline:1px solid var(--red);' : ''}"
            onchange="aggiornaRiga(${g},'note',this.value); if(this.value){this.style.borderColor='';this.style.outline='';}else if(datiMese[${g}].partenza&&datiMese[${g}].fine){this.style.borderColor='var(--red)';this.style.outline='1px solid var(--red)';}"/>
        </td>
      `;
      tbody.appendChild(tr);
    }
  }

  window.aggiornaRiga = function(g, campo, valore) {
    datiMese[g][campo] = valore;
    calcolaTotale(g);
    aggiornaStats();
    salvaSilenzioso();
  };

  function calcolaTotale(g) {
    const r       = datiMese[g];
    const partMin = oraToMin(r.partenza);
    const fineMin = oraToMin(r.fine);
    if (partMin === null || fineMin === null) {
      r.totale = '';
      const el = document.getElementById(`tot-${g}`);
      if (el) el.textContent = '';
      return;
    }
    const pausa = parseInt(r.pausa) || 0;
    let lavorati = fineMin - partMin - pausa;
    if (lavorati < 0) lavorati = 0;
    const ore = Math.floor(lavorati/60), min = lavorati % 60;
    r.totale = min > 0 ? `${ore}h ${String(min).padStart(2,'0')}m` : `${ore}h`;
    const el = document.getElementById(`tot-${g}`);
    if (el) el.textContent = r.totale;
  }

  function oraToMin(ora) {
    if (!ora) return null;
    const [h,m] = ora.split(':').map(Number);
    return h*60 + m;
  }

  function aggiornaStats() {
    let totaleMins = 0, giorni = 0;
    const oggi     = new Date();
    const startSet = new Date(oggi); startSet.setDate(oggi.getDate() - (oggi.getDay()===0?6:oggi.getDay()-1)); startSet.setHours(0,0,0,0);
    const endSet   = new Date(startSet); endSet.setDate(startSet.getDate()+6);
    let settMins   = 0;

    Object.entries(datiMese).forEach(([g, r]) => {
      const min = totaleToMin(r.totale);
      if (min > 0) { totaleMins += min; giorni++; }
      const dataG = new Date(viewYear, viewMonth, parseInt(g));
      if (dataG >= startSet && dataG <= endSet) settMins += min;
    });

    document.getElementById('statOreMese').textContent   = formatMin(totaleMins);
    document.getElementById('statGiorni').textContent    = giorni;
    document.getElementById('statSettimana').textContent = formatMin(settMins);
    document.getElementById('statMedia').textContent     = giorni > 0 ? formatMin(Math.round(totaleMins/giorni)) : '0h';
  }

  function totaleToMin(totale) {
    if (!totale) return 0;
    const mH = totale.match(/(\d+)h/), mM = totale.match(/(\d+)m/);
    return (mH ? parseInt(mH[1])*60 : 0) + (mM ? parseInt(mM[1]) : 0);
  }

  function formatMin(mins) {
    const h = Math.floor(mins/60), m = mins%60;
    return m > 0 ? `${h}h ${m}m` : `${h}h`;
  }

  async function salvaSilenzioso() {
    if (!currentUser) return;
    const chiave = `${viewYear}_${String(viewMonth+1).padStart(2,'0')}`;
    const ref    = doc(db, 'utenti', currentUser.uid, 'mesi', chiave);
    await setDoc(ref, { giorni: datiMese, aggiornato: serverTimestamp(), anno: viewYear, mese: viewMonth+1 }, { merge: true });
  }

  function validaCantieri() {
    const righeIncomplete = [];
    Object.entries(datiMese).forEach(([g, r]) => {
      if (r.partenza && r.fine && !r.note) righeIncomplete.push(g);
    });
    const giorniNelMese = new Date(viewYear, viewMonth+1, 0).getDate();
    for (let g = 1; g <= giorniNelMese; g++) {
      const r = datiMese[g];
      const inputs = document.querySelectorAll(`#tbodyOre tr:nth-child(${g}) input[type="text"]:last-of-type`);
      inputs.forEach(inp => {
        if (r && r.partenza && r.fine && !r.note) { inp.style.borderColor = 'var(--red)'; inp.style.outline = '1px solid var(--red)'; }
        else { inp.style.borderColor = ''; inp.style.outline = ''; }
      });
    }
    return righeIncomplete;
  }

  window.salvaTutto = async function() {
    const mancanti = validaCantieri();
    if (mancanti.length > 0) { showToast(`⚠ Cantiere obbligatorio per ${mancanti.length} giorno/i lavorato/i!`, true); return; }
    await salvaSilenzioso();
    showToast('✓ Salvato!');
  };

  window.scaricaPDF = async function() {
    const mancanti = validaCantieri();
    if (mancanti.length > 0) { showToast(`⚠ Compila il cantiere per tutti i giorni lavorati prima di scaricare il PDF!`, true); return; }
    await salvaSilenzioso();
    const { jsPDF } = window.jspdf;
    const doc2 = new jsPDF();
    const W = 210, mg = 14;
    doc2.setFillColor(15,15,15); doc2.rect(0,0,W,28,'F');
    doc2.setFillColor(255,106,0); doc2.rect(0,0,W,4,'F');
    doc2.setTextColor(255,106,0); doc2.setFontSize(18); doc2.setFont('helvetica','bold');
    doc2.text('GAMA SERVICE', mg, 18);
    doc2.setTextColor(180,180,180); doc2.setFontSize(9); doc2.setFont('helvetica','normal');
    doc2.text(`Registro Ore – ${MESI[viewMonth]} ${viewYear}`, W-mg, 18, {align:'right'});
    doc2.setFillColor(30,30,30); doc2.rect(mg, 32, W-mg*2, 12, 'F');
    doc2.setTextColor(200,200,200); doc2.setFontSize(10);
    doc2.text(`Tecnico: ${profilo.nomeCompleto}   |   Email: ${profilo.email}`, mg+4, 40);
    let y = 54;
    doc2.setFillColor(40,40,40); doc2.rect(mg, y-5, W-mg*2, 9, 'F');
    doc2.setTextColor(120,120,120); doc2.setFontSize(8); doc2.setFont('helvetica','bold');
    ['GIORNO','INIZIO','FINE','PAUSA','STRAORD.','ORE TOT','CANTIERE'].forEach((h,i) => {
      const xs = [mg+2, mg+30, mg+56, mg+82, mg+104, mg+130, mg+155];
      doc2.text(h, xs[i], y);
    });
    y += 7;
    const giorniNelMese = new Date(viewYear, viewMonth+1, 0).getDate();
    let totMins = 0, riga = 0;
    for (let g = 1; g <= giorniNelMese; g++) {
      if (y > 278) { doc2.addPage(); y = 20; }
      const data = new Date(viewYear, viewMonth, g);
      const dow = data.getDay(); const weekend = dow===0||dow===6;
      const nomeG = data.toLocaleDateString('it-IT',{weekday:'short',day:'2-digit',month:'2-digit'});
      const r = datiMese[g] || {};
      if (riga%2===0) { doc2.setFillColor(22,22,22); doc2.rect(mg,y-4,W-mg*2,8,'F'); }
      doc2.setFontSize(8.5); doc2.setFont('helvetica','normal');
      if (weekend) doc2.setTextColor(220,100,60); else doc2.setTextColor(210,210,210);
      const xs = [mg+2, mg+30, mg+56, mg+82, mg+104, mg+130, mg+155];
      doc2.text(nomeG, xs[0], y); doc2.text(r.partenza||'-', xs[1], y);
      doc2.text(r.fine||'-', xs[2], y); doc2.text(r.pausa ? r.pausa+'m' : '-', xs[3], y);
      doc2.setTextColor(200,160,60); doc2.text(r.straordinario||'-', xs[4], y);
      doc2.setTextColor(255,106,0); doc2.setFont('helvetica','bold'); doc2.text(r.totale||'-', xs[5], y);
      doc2.setTextColor(150,150,150); doc2.setFont('helvetica','normal'); doc2.setFontSize(7.5);
      if (r.note) doc2.text(r.note.substring(0,22), xs[6], y);
      totMins += totaleToMin(r.totale); y += 8; riga++;
    }
    y += 4;
    doc2.setFillColor(255,106,0); doc2.rect(mg, y-5, W-mg*2, 10, 'F');
    doc2.setTextColor(0,0,0); doc2.setFontSize(10); doc2.setFont('helvetica','bold');
    doc2.text('TOTALE MESE', mg+2, y+0.5); doc2.text(formatMin(totMins), W-mg-2, y+0.5, {align:'right'});
    doc2.setTextColor(80,80,80); doc2.setFontSize(7); doc2.setFont('helvetica','normal');
    doc2.text(`Generato il ${new Date().toLocaleDateString('it-IT')} – Gama Service`, W/2, 290, {align:'center'});
    doc2.save(`ore_${profilo.cognome}_${MESI[viewMonth]}_${viewYear}.pdf`);
    showToast('✓ PDF scaricato!');
  };

  window.doLogout = async function() {
    await salvaSilenzioso();
    await signOut(auth);
    window.location.href = 'index.html';
  };

  function showToast(msg, err=false) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = 'toast' + (err?' error':'');
    t.classList.add('show'); setTimeout(()=>t.classList.remove('show'), 2500);
  }
  window.showToast = showToast;
</script>

<script src="js/pwa-install.js"></script>

<!-- MODAL VISUALIZZATORE BUSTA PAGA -->
<div id="modalBusta" style="
  display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85);
  z-index:999; flex-direction:column; align-items:center; justify-content:center;
  padding:16px;">
  <div style="
    background:#1e1e1e; border-radius:12px; width:100%; max-width:900px;
    height:90vh; display:flex; flex-direction:column; overflow:hidden;
    border:1px solid rgba(255,106,0,0.3);">
    <!-- Header modal -->
    <div style="
      display:flex; align-items:center; justify-content:space-between;
      padding:14px 20px; border-bottom:1px solid rgba(255,255,255,0.1);
      background:#111;">
      <span id="modalBustaNome" style="color:#fff; font-weight:600; font-size:14px;">📄 Busta paga</span>
      <div style="display:flex; gap:10px; align-items:center;">
        <a id="modalBustaDownload" href="#" download style="
          color:var(--orange); font-size:12px; text-decoration:none;
          border:1px solid rgba(255,106,0,0.4); padding:5px 12px; border-radius:6px;">
          ⬇ Scarica
        </a>
        <button onclick="chiudiModalBusta()" style="
          background:none; border:none; color:#aaa; font-size:22px;
          cursor:pointer; line-height:1; padding:0 4px;">✕</button>
      </div>
    </div>
    <!-- Iframe visualizzatore -->
    <iframe id="modalBustaFrame" src="" style="
      flex:1; border:none; width:100%; background:#fff;"></iframe>
  </div>
</div>

<script>
window.visualizzaBusta = function(url, nome) {
  document.getElementById('modalBustaNome').textContent = '📄 ' + nome;
  document.getElementById('modalBustaDownload').href = url;
  document.getElementById('modalBustaDownload').download = nome;

  const modal = document.getElementById('modalBusta');
  modal.style.display = 'flex';

  // Su mobile usa Google Docs viewer per compatibilità
  const isMobile = /Android|iPhone|iPad/i.test(navigator.userAgent);
  const src = isMobile
    ? 'https://docs.google.com/viewer?url=' + encodeURIComponent(url) + '&embedded=true'
    : url;

  document.getElementById('modalBustaFrame').src = src;
};

window.chiudiModalBusta = function() {
  document.getElementById('modalBusta').style.display = 'none';
  document.getElementById('modalBustaFrame').src = '';
};

// Chiudi con ESC
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') chiudiModalBusta();
});
</script>

</body>
</html>
