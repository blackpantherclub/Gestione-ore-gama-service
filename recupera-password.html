<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Recupera Password – Gama Service</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<div class="page-sm">

  <div class="auth-logo">
    <h1>GAMA<span style="color:var(--text)">SERVICE</span></h1>
    <p>Recupero Password</p>
  </div>

  <div class="card">
    <div class="card-title">— Reimposta la tua password</div>

    <p style="font-size:13px;color:var(--muted2);margin-bottom:20px;line-height:1.6;">
      Inserisci la tua email. Ti manderemo un link per reimpostare la password.
    </p>

    <div class="form-group">
      <label>Email</label>
      <input type="email" id="recEmail" placeholder="mario.rossi@email.it" autocomplete="email"/>
    </div>

    <div class="alert alert-error" id="recError"></div>
    <div class="alert alert-success" id="recSuccess"></div>

    <button class="btn btn-primary" id="btnRec" onclick="doRecupero()">
      Invia link di recupero
    </button>
  </div>

  <div class="auth-link">
    Ricordi la password? <a href="index.html">Torna al login</a>
  </div>

</div>

<script type="module">
  import { auth } from './js/firebase-config.js';
  import { sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  window.doRecupero = async function() {
    const email = document.getElementById('recEmail').value.trim();
    const errEl = document.getElementById('recError');
    const okEl  = document.getElementById('recSuccess');
    const btn   = document.getElementById('btnRec');

    errEl.classList.remove('show');
    okEl.classList.remove('show');

    if (!email) { showErr('Inserisci la tua email'); return; }
    if (!email.includes('@')) { showErr('Email non valida'); return; }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Invio in corso...';

    try {
      await sendPasswordResetEmail(auth, email);
      okEl.textContent = '✓ Email inviata! Controlla la tua casella di posta (anche spam).';
      okEl.classList.add('show');
      btn.innerHTML = '✓ Email inviata';
    } catch(e) {
      let msg = 'Errore durante l\'invio';
      if (e.code === 'auth/user-not-found')  msg = 'Nessun account trovato con questa email';
      if (e.code === 'auth/invalid-email')   msg = 'Email non valida';
      if (e.code === 'auth/too-many-requests') msg = 'Troppi tentativi, riprova tra poco';
      showErr(msg);
      btn.disabled = false;
      btn.innerHTML = 'Invia link di recupero';
    }
  };

  function showErr(msg) {
    const el = document.getElementById('recError');
    el.textContent = msg;
    el.classList.add('show');
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') window.doRecupero();
  });
</script>
</body>
</html>
